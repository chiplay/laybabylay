# Fly.io config — STAGING app for laybabylay.
# One-time create:  fly apps create laybabylay-staging
# Manual deploy:    fly deploy
app = "laybabylay-staging"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
