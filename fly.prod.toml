# fly.toml app configuration file generated for laybabylay-prod on 2026-06-16T01:41:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'laybabylay-prod'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
